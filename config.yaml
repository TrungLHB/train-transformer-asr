# Experiment configuration for Transformer ASR training

project: "transformer-asr"
run_name: null  # auto-generated by W&B if null

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  dataset_name: "mozilla-foundation/common_voice_13_0"
  language_code: "vi"           # e.g. "vi" for Vietnamese (low-resource)
  train_split: "train"
  val_split: "validation"
  test_split: "test"
  max_audio_length_sec: 15.0    # drop samples longer than this
  sample_rate: 16000
  num_workers: 4

# ── Feature extraction ────────────────────────────────────────────────────────
features:
  n_mels: 80
  n_fft: 400
  hop_length: 160
  win_length: 400

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  vocab_size: null              # filled automatically from tokenizer
  d_model: 256
  n_heads: 4
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.1
  ctc_weight: 0.3               # weight of CTC loss vs cross-entropy loss

# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs: 50
  batch_size: 16
  grad_accumulation_steps: 2
  learning_rate: 1.0e-4
  warmup_steps: 4000
  weight_decay: 1.0e-6
  max_grad_norm: 1.0
  seed: 42
  fp16: true
  output_dir: "checkpoints"

# ── W&B monitoring ────────────────────────────────────────────────────────────
wandb:
  project: "transformer-asr"
  entity: null                  # your W&B username / org (null = default)
  log_interval: 50              # log training metrics every N steps
  log_audio_samples: 5          # number of validation audio samples to log per epoch
  watch_model: true             # log gradients and parameters
  watch_log_freq: 100
  save_artifact: true           # upload model checkpoints as W&B Artifacts
