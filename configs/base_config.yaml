# Base configuration shared by all training runs

# Audio feature extraction
audio:
  sample_rate: 16000
  n_mels: 80
  n_fft: 512
  hop_length: 160        # 10ms at 16kHz
  win_length: 400        # 25ms at 16kHz
  f_min: 80.0
  f_max: 7600.0
  max_duration: 30.0     # seconds; clips longer than this are discarded
  min_duration: 0.5      # seconds; clips shorter than this are discarded

# SpecAugment data augmentation
spec_augment:
  freq_mask_param: 27    # F parameter (max frequency mask width)
  time_mask_param: 100   # T parameter (max time mask width)
  num_freq_masks: 2
  num_time_masks: 2

# Encoder (Conformer/Transformer)
encoder:
  d_model: 128           # reduced from 256 → ~3M params vs ~12M
  num_heads: 4           # 128/4 = 32 dims per head
  num_layers: 4          # reduced from 6
  ff_dim: 512            # reduced from 2048
  dropout: 0.1
  conv_kernel_size: 31   # used only when encoder_type=conformer
  encoder_type: conformer  # "transformer" or "conformer"

# Dataset
data:
  dataset_name: google/fleurs
  language: "cy_gb"       # Welsh – FLEURS locale code
  transcript_field: "transcription"  # field name containing the transcript
  train_split: "train"
  valid_split: "validation"
  test_split: "test"
  data_dir: "./data"
  num_workers: 2         # Colab VMs have ~2 usable CPUs
  cache_dir: "./cache"

# Tokenizer / vocabulary
tokenizer:
  type: "char"           # "char" or "bpe"
  vocab_size: 100        # used only when type=bpe
  blank_id: 0            # CTC blank token id

# Training  (tuned for Colab T4, effective batch = 8 × 8 = 64)
training:
  seed: 42
  batch_size: 8          # T4-safe; raise to 16 if no OOM
  grad_accumulation_steps: 8   # keeps effective batch at 64
  max_epochs: 50         # FLEURS Welsh converges well before 100
  learning_rate: 1.0e-3
  warmup_steps: 2000     # shorter warmup for smaller dataset
  weight_decay: 1.0e-6
  clip_grad_norm: 1.0
  early_stopping_patience: 5   # avoid wasting Colab session time
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
  log_interval: 50       # log every N steps
  eval_interval: 1       # evaluate every N epochs
  save_best_only: true

# Hardware
hardware:
  device: "cuda"         # "cuda" or "cpu"
  fp16: true             # T4 Tensor Cores: always keep ON
  distributed: false

# Weights & Biases
wandb:
  enabled: true
  project: "welsh-asr"   # W&B project name
  entity: null           # W&B team/user (null = your default entity)
  run_name: null         # null = auto-generated by W&B
  tags: ["fleurs", "cy_gb", "conformer"]
  log_model: true        # set true to upload best checkpoint as W&B artifact
