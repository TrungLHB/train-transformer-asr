# Transformer (attention-based autoregressive) decoder configuration
# Extends base_config.yaml

defaults:
  - base_config

decoder:
  type: transformer
  d_model: 128           # must match encoder d_model
  num_heads: 4           # 128/4 = 32 dims per head
  num_layers: 4          # reduced from 6
  ff_dim: 512            # reduced from 2048
  dropout: 0.1
  max_target_length: 200  # maximum number of output tokens

  # Beam search inference settings
  beam_size: 1
  length_penalty: 1.0
  eos_id: 1
  sos_id: 2
  
  # Joint CTC-Attention Training Settings
  ctc_weight: 0.3
  blank_id: 0

training:
  decoder_loss_weight: 1.0  # weight for cross-entropy loss
